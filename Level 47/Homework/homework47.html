<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="div1">
        <ol>
            <li class="inside">List item</li>
            <li class="inside" id="inside2">List item</li>
            <li class="inside">List item</li>
            <li class="outside"><b>1.</b> List sub item</li>
            <li class="outside"><b>2.</b> List sub item</li>
        </ol>
    </div>
    <div id="div2">
        <h1>Get in Touch</h1>
        <p>
        Fill out the form below and we'll get back to you as soon as possible.
        </p>
        <label>Name</label>
        <br>
        <input type="text" placeholder="Your name">
        <br>
        <br>
        <label>Email</label>
        <br>
        <input type="email" placeholder="Your email">
        <br>
        <br>
        <label>Phone</label>
        <br>
        <input type="tel" placeholder="+1 (234) 56789">
        <br>
        <br>
        <label>Message</label>
        <br>
        <textarea placeholder="Your message"></textarea>
        <br>
        <br>
        <button type="submit" id="message"><b id="b1">Send Message</b></button>
    </div>
</body>
</html>
